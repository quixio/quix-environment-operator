# Default values for quix-environment-operator.
# This is a YAML-formatted file.

replicaCount: 1

image:
  repository: quixanalytics/quix-environment-operator
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "quix-environment-operator"

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

resources:
  limits:
    cpu: 100m
    memory: 96Mi
  requests:
    cpu: 25m
    memory: 32Mi

nodeSelector: {}

tolerations: []

affinity: {}

env:
  # Namespace suffix for provisioned environments (will be appended to environment name)
  namespaceSuffix: "-qdep"
  
  # Environment ID validation regex
  environmentRegex: ""
  
  # ServiceAccount for RoleBindings
  serviceAccountName: "quix-platform-account"

  # Service account namespace, which defaults to release namespace
  serviceAccountNameSpace:
  
  # ClusterRole for RoleBindings
  clusterRoleName: "quix-platform-account-role"

  # Cache sync period for informers (how often controller checks for changes)
  cacheSyncPeriod: "10m"

  # Grant `pods/exec` to environment users in their namespace. This enables in-container
  # debugging (kubectl exec) but lets any user bound to the platform role run arbitrary commands
  # inside their pods, bypassing image-level controls, with no per-call audit unless cluster
  # audit-policy is configured. The grant is namespace-scoped via RoleBinding. Defaults to true to
  # preserve existing behavior; set to false for a more restricted, secure-by-default posture.
  allowPodsExec: true
  