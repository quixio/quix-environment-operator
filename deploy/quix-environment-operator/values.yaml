# Default values for quix-environment-operator.
# This is a YAML-formatted file.

replicaCount: 1

image:
  repository: quixanalytics/quix-environment-operator
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "quix-environment-operator"

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

resources:
  limits:
    cpu: 100m
    memory: 96Mi
  requests:
    cpu: 25m
    memory: 32Mi

nodeSelector: {}

tolerations: []

affinity: {}

env:
  # Namespace suffix for provisioned environments (will be appended to environment name)
  namespaceSuffix: "-qdep"
  
  # Environment ID validation regex
  environmentRegex: ""
  
  # ServiceAccount for RoleBindings
  serviceAccountName: "quix-platform-account"

  # Service account namespace, which defaults to release namespace
  serviceAccountNameSpace:
  
  # ClusterRole for RoleBindings
  clusterRoleName: "quix-platform-account-role"

  # Cache sync period for informers (how often controller checks for changes)
  cacheSyncPeriod: "10m"

  # Grant `pods/exec` to environment users in their namespace. This enables in-container
  # debugging (kubectl exec) but lets any user bound to the platform role run arbitrary commands
  # inside their pods, bypassing image-level controls, with no per-call audit unless cluster
  # audit-policy is configured. The grant is namespace-scoped via RoleBinding. Defaults to true to
  # preserve existing behavior; set to false for a more restricted, secure-by-default posture.
  allowPodsExec: true

# Network exposure of the operator's own endpoints.
# The metrics (8080) and health (8081) endpoints bind to all interfaces by default and are
# unauthenticated. To lock them down you can either bind them to localhost (see metrics/health
# below) or restrict ingress with the NetworkPolicy below (preferred when monitoring scrapes them).
metrics:
  # Address the controller binds its metrics endpoint to. Use "127.0.0.1:8080" to disable remote
  # scraping entirely, or ":8080" to expose on all interfaces (default).
  bindAddress: ":8080"
health:
  # Address the controller binds its health/probe endpoint to. Keep reachable by the kubelet.
  bindAddress: ":8081"

networkPolicy:
  # Opt-in (default false to preserve behavior). When true, ingress to the metrics/health ports is
  # restricted to the sources listed in monitoringSources.
  enabled: false
  # NetworkPolicy peer entries (from:) allowed to reach ports 8080/8081, e.g.:
  #   - namespaceSelector:
  #       matchLabels:
  #         kubernetes.io/metadata.name: monitoring
  #     podSelector:
  #       matchLabels:
  #         app.kubernetes.io/name: prometheus
  monitoringSources: []
