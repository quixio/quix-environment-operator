apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "quix-environment-operator.fullname" . }}
  labels:
    {{- include "quix-environment-operator.labels" . | nindent 4 }}
rules:
# Allows the controller to manage the custom environment resources
- apiGroups: ["quix.io"]
  resources: ["environments"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Enables the controller to update status subresource of environment resources
- apiGroups: ["quix.io"]
  resources: ["environments/status"]
  verbs: ["get", "update", "patch"]
# Required for implementing finalizers on environment resources
- apiGroups: ["quix.io"]
  resources: ["environments/finalizers"]
  verbs: ["update"]
# Allows the controller to create and manage namespaces for environments
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "create", "delete", "watch", "update", "patch"]
# Enables the controller to manage role bindings for environment access control
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["rolebindings"]
  verbs: ["get", "list", "create", "update", "delete", "watch"]
# Allows the controller to read ClusterRoles (e.g. to validate the configured platform role).
# Note: this operator ClusterRole is bound cluster-wide to the controller's ServiceAccount via
# operator-cluster-role-binding.yaml. That is distinct from the platform ClusterRole, which the
# controller binds per-namespace via the RoleBindings it creates for each environment.
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["clusterroles"]
  verbs: ["get", "list", "watch"]
# Allows the controller to emit events for observability and troubleshooting
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
# Enables leader election (--leader-elect) via coordination Leases so only one replica reconciles
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Grants the operator permission to bind the platform ClusterRole to namespace service accounts.
# Kubernetes privilege-escalation prevention requires the binder to either hold every permission
# the bound role grants or have the bind verb on it. We take the least-privilege path: bind only,
# scoped to the configured platform role, so the operator can create the RoleBinding without
# itself holding the workload permissions. The workload rules live in platform-cluster-role.yaml.
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["clusterroles"]
  resourceNames: ["{{ .Values.env.clusterRoleName }}"]
  verbs: ["bind"]
