{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "quix-environment-operator.fullname" . }}
  labels:
    {{- include "quix-environment-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "quix-environment-operator.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Restrict access to the metrics (8080) and health (8081) ports to the configured monitoring
    # sources. Note: kubelet liveness/readiness probes originate from the node (host network) and
    # are generally not subject to NetworkPolicy, so probes to 8081 continue to work. If your CNI
    # enforces NetworkPolicy on node-sourced traffic, add the node CIDR to monitoringSources.
    - from:
        {{- toYaml .Values.networkPolicy.monitoringSources | nindent 8 }}
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
{{- end }}
